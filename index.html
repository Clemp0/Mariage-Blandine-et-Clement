<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mariage de Blandine & Clément</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat', sans-serif;
    color:#495048;
    background:#F8F5EF;
    line-height:1.8;
}

/* TITRES */
h1,h2,h3{
    font-family:'Cormorant Garamond', serif;
}

/* HERO */
header{
    height:100vh;
    background:linear-gradient(rgba(40,60,40,.45),rgba(40,60,40,.45)),
    <img src="images/DSC_0473.png" width="250">;
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

header h1{
    font-size:4em;
    margin-bottom:20px;
}

header p{
    font-size:1.4em;
}

/* SECTIONS */
section{
    max-width:900px;
    margin:auto;
    padding:70px 20px;
}

h2{
    text-align:center;
    margin-bottom:35px;
    color:#5F6F52;
    font-size:2.2em;
}

/* CARTES */
.card{
    background:#FFFDF8;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(95,111,82,.10);
    border:2px solid #E7E4D7;
    margin-bottom:30px;
}

/* BOUTON */
.button{
    display:inline-block;
    background:#8E9F8A;
    color:white;
    text-decoration:none;
    padding:15px 35px;
    border-radius:40px;
    margin-top:25px;
    transition:.3s;
    font-weight:bold;
}

.button:hover{
    background:#5F6F52;
}

/* FOOTER */
footer{
    background:#5F6F52;
    color:#FFFDF8;
    text-align:center;
    padding:45px;
}

/* COUNTDOWN */
.countdown{
    text-align:center;
    font-size:2.3em;
    color:#8E9F8A;
    font-weight:bold;
}

/* STYLE DIVERS */
hr{
    border:none;
    border-top:2px dashed #EFCB68;
    margin:25px 0;
}

strong{
    color:#C9A227;
}

iframe{
    width:100%;
    height:350px;
    border:none;
    border-radius:15px;
}

</style>
</head>

<body>

<header>
    <div>
        <h1>Blandine & Clément</h1>
        <p>Nous avons le bonheur de vous inviter à notre mariage</p>
        <p>12 • 13 • 14 mars 2027</p>
        <p>au Hameau de Valouse</p>
    </div>
</header>

<section>
<h2>Informations à venir...</h2>
</section>

<section>
<h2>⏳ Compte à rebours</h2>
<div class="countdown" id="countdown"></div>
</section>
    
<script>

const wedding = new Date("March 13, 2027 15:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = wedding - now;

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

document.getElementById("countdown").innerHTML =
days + " jours " + hours + " h " + minutes + " min";

},1000);

</script>

</body>
</html>
